<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE ALL</title>
    <script>
      (function () {
        var k = "the-all-theme";
        var last = sessionStorage.getItem(k);
        var theme = last === "dark" ? "light" : last === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        sessionStorage.setItem(k, theme);
      })();
    </script>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="site-header site-header--video">
      <div class="site-header__hero">
        <div class="site-header__video-stage" aria-hidden="true">
          <video class="site-header__video is-active" src="assets/videos/human-cross.mp4" muted playsinline preload="auto"></video>
          <video class="site-header__video" src="assets/videos/cross-video.mp4" muted playsinline preload="auto"></video>
          <video class="site-header__video" src="assets/videos/head.mp4" muted playsinline preload="auto"></video>
        </div>
        <div class="site-header__overlay" aria-hidden="true"></div>
        <div class="site-header__inner">
          <div class="site-header__content">
            <h1 class="site-title">
              THE ALL is MIND;<br />
              The Universe is Mental.
            </h1>
            <button type="button" class="theme-toggle" aria-label="Switch to dark mode">
              <span class="theme-toggle__glyph theme-toggle__glyph--moon" aria-hidden="true">⋆.˚✮☽☯︎☾✮˚.⋆</span>
              <span class="theme-toggle__glyph theme-toggle__glyph--sun" aria-hidden="true">── ⋆⋅𖤓⋅⋆ ──</span>
            </button>
            <nav aria-label="Primary">
              <ul class="site-nav">
                <li><a href="index.html" aria-current="page">Artefacts</a></li>
                <li><a href="about.html">Process</a></li>
                <!-- <li><a href="#contact">Contact</a></li> -->
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </header>
    <main class="page page--home">
      <section class="product-grid" aria-label="Clothing">
        <img src="assets/images/tshirt-black-cross-detail.jpg" alt="Black t-shirt cross print detail" />
        <img src="assets/images/tshirt-cross-black.jpg" alt="Black t-shirt with cross print" />
        <img src="assets/images/tshirt-head-black.jpg" alt="Black t-shirt with head print" />
        <img src="assets/images/tshirt-head-black-detail.jpg" alt="Black t-shirt head print detail" />
        <img src="assets/images/tshirt-cross-pink.jpg" alt="Pink t-shirt with cross print" />
        <img src="assets/images/tshirt-cross-pink-detail.jpg" alt="Pink t-shirt cross print detail" />
        <img src="assets/images/sleeveless-body-black.jpg" alt="Black sleeveless shirt with body print" />
        <img src="assets/images/sleeveless-body-black-detail.jpg" alt="Black sleeveless shirt body print detail" />
        <img src="assets/images/wifebeater-cross-detail.jpg" alt="Wifebeater cross print detail" />
        <img src="assets/images/wifebeater-cross-black.jpg" alt="Black wifebeater with cross print" />
      </section>

      <h2 class="section-heading section-heading--bag">
        Bag
        <span class="section-heading__subtitle">*glows in the dark</span>
      </h2>

      <section class="bag-grid" aria-label="Bag">
        <img src="assets/images/bag-glow-dark.jpg" alt="Glow in the dark bag" />
        <img src="assets/images/bag-detail.jpg" alt="Bag print detail" />
      </section>

      <h2 class="section-heading">Prints (A4)</h2>

      <section class="prints-grid" aria-label="Prints">
        <img src="assets/images/print-body-a4.jpg" alt="Body print A4" />
        <img src="assets/images/print-body-white.jpg" alt="Body print on white" />
        <img src="assets/images/print-cross-a4.jpg" alt="Cross print A4" />
        <img src="assets/images/print-head-a4.jpg" alt="Head print A4" />
      </section>

      <footer id="contact" class="contact">
        <h2 class="contact__heading">Contact</h2>
        <div class="contact__links">
          <p class="contact__email">
            <a href="mailto:dimitar@vuksanov.com">dimitar@vuksanov.com</a>
          </p>
          <p class="contact__instagram">
            <a href="https://www.instagram.com/dimitarvuksanov/" target="_blank" rel="noopener noreferrer">@dimitarvuksanov</a>
          </p>
        </div>
      </footer>
    </main>
    <script src="js/theme.js"></script>
    <script src="js/header-video.js"></script>
  </body>
</html>
